services:
  app:
    image: ${IMAGE:-ghcr.io/joeblack2k/retrosavemanager:${IMAGE_TAG:-latest}}
    environment:
      PORT: ${PORT:-80}
      AUTH_MODE: ${AUTH_MODE:-disabled}
      SAVE_ROOT: /saves
      STATE_ROOT: /config
      BASE_URL: ${BASE_URL:-}
      PUBLIC_HOST: ${PUBLIC_HOST:-}
      TLS_ENABLED: ${TLS_ENABLED:-false}
      IGDB_CLIENT_ID: ${IGDB_CLIENT_ID:-}
      IGDB_CLIENT_SECRET: ${IGDB_CLIENT_SECRET:-}
      RAWG_API_KEY: ${RAWG_API_KEY:-}
      BOOTSTRAP_DEMO_DATA: ${BOOTSTRAP_DEMO_DATA:-false}
    volumes:
      - ${CONFIG_HOST_PATH:?set CONFIG_HOST_PATH to an absolute persistent host directory}:/config
      - ${SAVES_HOST_PATH:?set SAVES_HOST_PATH to an absolute persistent host directory}:/saves
    ports:
      - ${HTTP_PORT:-80}:${PORT:-80}
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge
