services:
  app:
    image: ${IMAGE:-ghcr.io/joeblack2k/retrosavemanager:${IMAGE_TAG:-latest}}
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        VITE_AUTH_REQUIRED: ${VITE_AUTH_REQUIRED:-false}
    environment:
      PORT: ${PORT:-80}
      AUTH_MODE: ${AUTH_MODE:-disabled}
      SAVE_ROOT: /saves
      STATE_ROOT: /config
      BASE_URL: ${BASE_URL:-}
      PUBLIC_HOST: ${PUBLIC_HOST:-}
      TLS_ENABLED: ${TLS_ENABLED:-false}
      IGDB_CLIENT_ID: ${IGDB_CLIENT_ID:-}
      IGDB_CLIENT_SECRET: ${IGDB_CLIENT_SECRET:-}
      RAWG_API_KEY: ${RAWG_API_KEY:-}
    volumes:
      - ${CONFIG_HOST_PATH:-./data/config}:/config
      - ${SAVES_HOST_PATH:-./data/saves}:/saves
    ports:
      - ${HTTP_PORT:-80}:${PORT:-80}
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge
