presets:
  - id: unlockAllKeys
    label: Unlock All Keys
    updates:
      keys: [dinoDomainKey, sherbetIslandKey, snowflakeMountainKey, dragonForestKey]
  - id: allFirstPlaceTrophies
    label: All First Place Trophies
    updates:
      dinoDomainTrophy: firstPlace
      sherbetIslandTrophy: firstPlace
      snowflakeMountTrophy: firstPlace
      dragonForestTrophy: firstPlace
      futureFunLandTrophy: firstPlace
  - id: maxAmulets
    label: Max Amulets
    updates:
      ttAmulet: 4
      wizpigAmulet: 4
