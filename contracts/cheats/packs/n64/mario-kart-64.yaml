gameId: n64/mario-kart-64
systemSlug: n64
editorId: mk64-eeprom
title: Mario Kart 64
match:
  titleAliases:
    - Mario Kart 64
    - Mario Kart 64 USA
    - Mario Kart 64 Europe
    - Mario Kart 64 Japan
payload:
  exactSizes:
    - 512
  formats:
    - eep
    - bin
    - sram
sections:
  - id: audio
    title: Audio
    fields:
      - id: soundMode
        label: Sound Mode
        type: enum
        options:
          - id: stereo
            label: Stereo
          - id: headphones
            label: Headphones
          - id: unused
            label: Unused
          - id: mono
            label: Mono
        op:
          kind: soundMode
  - id: gp-50cc
    title: 50cc Grand Prix
    fields:
      - id: gp50Mushroom
        label: Mushroom Cup
        type: enum
        options: &cupOptions
          - id: none
            label: No Cup
          - id: bronze
            label: Bronze Cup
          - id: silver
            label: Silver Cup
          - id: gold
            label: Gold Cup
        op: { kind: gpCupPoints, mode: 50cc, cup: mushroom }
      - id: gp50Flower
        label: Flower Cup
        type: enum
        options: *cupOptions
        op: { kind: gpCupPoints, mode: 50cc, cup: flower }
      - id: gp50Star
        label: Star Cup
        type: enum
        options: *cupOptions
        op: { kind: gpCupPoints, mode: 50cc, cup: star }
