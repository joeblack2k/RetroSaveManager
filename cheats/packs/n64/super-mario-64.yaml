presets:
  - id: unlockCaps
    label: Unlock All Caps
    description: Enable Wing, Metal, and Vanish cap switches.
    updates:
      haveWingCap: true
      haveMetalCap: true
      haveVanishCap: true
  - id: giveBowserKeys
    label: Give Bowser Keys
    description: Add both Bowser keys to the selected save file.
    updates:
      haveKey1: true
      haveKey2: true
  - id: unlockCastle
    label: Unlock Castle Progress
    description: Unlock the main castle doors and progression gates.
    updates:
      unlockedBasementDoor: true
      unlockedUpstairsDoor: true
      dddMovedBack: true
      moatDrained: true
      unlockedPssDoor: true
      unlockedWfDoor: true
      unlockedCcmDoor: true
      unlockedJrbDoor: true
      unlockedBitdwDoor: true
      unlockedBitfsDoor: true
      unlocked50StarDoor: true
  - id: unlockAllCannons
    label: Unlock All Cannons
    description: Open every main-course cannon.
    updates:
      bobCannon: true
      wfCannon: true
      jrbCannon: true
      ccmCannon: true
      bbhCannon: true
      hmcCannon: true
      lllCannon: true
      sslCannon: true
      dddCannon: true
      slCannon: true
      wdwCannon: true
      ttmCannon: true
      thiCannon: true
      ttcCannon: true
      rrCannon: true
  - id: unlockCastleSecretStars
    label: Unlock Castle Secret Stars
    description: Enable the seven castle secret stars stored in the main save flags.
    updates:
      castleSecretStars: ["bit1", "bit2", "bit3", "bit4", "bit5", "bit6", "bit7"]
  - id: unlockMainCourseStars
    label: Unlock Main Course Stars
    description: Mark all seven stars in each of the 15 main courses.
    updates:
      bobStars: ["bit1", "bit2", "bit3", "bit4", "bit5", "bit6", "bit7"]
      wfStars: ["bit1", "bit2", "bit3", "bit4", "bit5", "bit6", "bit7"]
      jrbStars: ["bit1", "bit2", "bit3", "bit4", "bit5", "bit6", "bit7"]
      ccmStars: ["bit1", "bit2", "bit3", "bit4", "bit5", "bit6", "bit7"]
      bbhStars: ["bit1", "bit2", "bit3", "bit4", "bit5", "bit6", "bit7"]
      hmcStars: ["bit1", "bit2", "bit3", "bit4", "bit5", "bit6", "bit7"]
      lllStars: ["bit1", "bit2", "bit3", "bit4", "bit5", "bit6", "bit7"]
      sslStars: ["bit1", "bit2", "bit3", "bit4", "bit5", "bit6", "bit7"]
      dddStars: ["bit1", "bit2", "bit3", "bit4", "bit5", "bit6", "bit7"]
      slStars: ["bit1", "bit2", "bit3", "bit4", "bit5", "bit6", "bit7"]
      wdwStars: ["bit1", "bit2", "bit3", "bit4", "bit5", "bit6", "bit7"]
      ttmStars: ["bit1", "bit2", "bit3", "bit4", "bit5", "bit6", "bit7"]
      thiStars: ["bit1", "bit2", "bit3", "bit4", "bit5", "bit6", "bit7"]
      ttcStars: ["bit1", "bit2", "bit3", "bit4", "bit5", "bit6", "bit7"]
