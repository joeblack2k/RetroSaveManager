  - id: coin-scores
    title: 100-Coin Scores
    fields:
      - id: bob100Coin
        label: Bob-omb Battlefield 100-Coin Score
        type: integer
        min: 0
        max: 255
        step: 1
        op: { kind: courseCoinScore, course: bob }
