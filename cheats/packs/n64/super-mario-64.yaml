schemaVersion: 1
adapterId: sm64-eeprom
gameId: n64/super-mario-64
systemSlug: n64
editorId: sm64-eeprom
title: Super Mario 64
match:
  titleAliases:
    - Super Mario 64
    - Super Mario 64 USA
    - Super Mario 64 Europe
    - Super Mario 64 Japan
    - Mario 64
payload:
  exactSizes:
    - 512
    - 2048
  formats:
    - eep
    - bin
    - sram
selector:
  id: file
  label: Save File
  type: save-file
  options:
    - id: A
      label: File A
    - id: B
      label: File B
    - id: C
      label: File C
    - id: D
      label: File D
sections:
  - id: abilities
    title: Abilities
    fields:
      - id: haveWingCap
        label: Wing Cap Switch
        type: boolean
        op:
          kind: flag
          flag: haveWingCap
      - id: haveMetalCap
        label: Metal Cap Switch
        type: boolean
        op:
          kind: flag
          flag: haveMetalCap
      - id: haveVanishCap
        label: Vanish Cap Switch
        type: boolean
        op:
          kind: flag
          flag: haveVanishCap
      - id: haveKey1
        label: Bowser Key 1
        type: boolean
        op:
          kind: flag
          flag: haveKey1
      - id: haveKey2
        label: Bowser Key 2
        type: boolean
        op:
          kind: flag
          flag: haveKey2
  - id: castle-progress
    title: Castle Progress
    fields:
      - id: unlockedBasementDoor
        label: Basement Door
        type: boolean
        op:
          kind: flag
          flag: unlockedBasementDoor
      - id: unlockedUpstairsDoor
        label: Upstairs Door
        type: boolean
        op:
          kind: flag
          flag: unlockedUpstairsDoor
      - id: dddMovedBack
        label: Dire Dire Docks Moved Back
        type: boolean
        op:
          kind: flag
          flag: dddMovedBack
      - id: moatDrained
        label: Moat Drained
        type: boolean
        op:
          kind: flag
          flag: moatDrained
      - id: unlockedPssDoor
        label: Princess's Secret Slide Door
        type: boolean
        op:
          kind: flag
          flag: unlockedPssDoor
      - id: unlockedWfDoor
        label: Whomp's Fortress Door
        type: boolean
        op:
          kind: flag
          flag: unlockedWfDoor
      - id: unlockedCcmDoor
        label: Cool, Cool Mountain Door
        type: boolean
        op:
          kind: flag
          flag: unlockedCcmDoor
      - id: unlockedJrbDoor
        label: Jolly Roger Bay Door
        type: boolean
        op:
          kind: flag
          flag: unlockedJrbDoor
      - id: unlockedBitdwDoor
        label: Bowser in the Dark World Door
        type: boolean
        op:
          kind: flag
          flag: unlockedBitdwDoor
      - id: unlockedBitfsDoor
        label: Bowser in the Fire Sea Door
        type: boolean
        op:
          kind: flag
          flag: unlockedBitfsDoor
      - id: unlocked50StarDoor
        label: 50 Star Door
        type: boolean
        op:
          kind: flag
          flag: unlocked50StarDoor
      - id: castleSecretStars
        label: Castle Secret Stars
        type: bitmask
        bitLabels:
          - Secret Star 1
          - Secret Star 2
          - Secret Star 3
          - Secret Star 4
          - Secret Star 5
          - Secret Star 6
          - Secret Star 7
        op:
          kind: secretStars
  - id: course-stars
    title: Course Stars
    fields:
      - id: bobStars
        label: Bob-omb Battlefield Stars
        type: bitmask
        bitLabels: ["Star 1", "Star 2", "Star 3", "Star 4", "Star 5", "Star 6", "Star 7"]
        op: { kind: courseStars, course: bob }
      - id: wfStars
        label: Whomp's Fortress Stars
